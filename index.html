// ==================== DATABASE (localStorage) ====================
const DB = {
  get(key, fallback = []) {
    try { return JSON.parse(localStorage.getItem('st_' + key)) || fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem('st_' + key, JSON.stringify(val)); },
};

// Simple bcrypt-like hash (NOT real bcrypt - for demo only)
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return 'hash_' + Math.abs(hash).toString(36) + '_' + str.length;
}

function verifyHash(password, hash) {
  return simpleHash(password) === hash;
}

// Init default CEO
function initDB() {
  const users = DB.get('users', []);
  if (!users.find(u => u.email === 'ceo@company.com')) {
    users.push({
      id: 'ceo_001', email: 'ceo@company.com', name: 'CEO',
      password: simpleHash('admin123'), role: 'CEO',
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    });
    DB.set('users', users);
  }
}

// ==================== HELPERS ====================
const formatCurrency = (amt) =>
  new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(amt || 0);

const formatDate = (d) =>
  new Date(d).toLocaleDateString('en-NG', { day: '2-digit', month: 'short', year: 'numeric' });

const periodLabels = { all: 'All Time', daily: 'Today', weekly: 'This Week', monthly: 'This Month', yearly: 'This Year' };

function filterByPeriod(items, period, dateField = 'recordedAt') {
  if (period === 'all') return items;
  const now = new Date();
  return items.filter(item => {
    const d = new Date(item[dateField]);
    switch (period) {
      case 'daily': return d.toDateString() === now.toDateString();
      case 'weekly': {
        const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
        return d >= weekAgo && d <= now;
      }
      case 'monthly': return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      case 'yearly': return d.getFullYear() === now.getFullYear();
      default: return true;
    }
  });
}

function generateId() {
  return 'id_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

// ==================== LOGIN PAGE ====================
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    const users = DB.get('users', []);
    const user = users.find(u => u.email === email);
    if (!user || !verifyHash(password, user.password)) {
      setError('Invalid email or password');
      setLoading(false);
      return;
    }
    onLogin(user);
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-slate-50 via-white to-emerald-50/30 p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-600 text-white mb-4 shadow-lg shadow-emerald-200">
            <Icon name="cart" size={32} />
          </div>
          <h1 className="text-3xl font-bold text-slate-900">Sales Tracker</h1>
          <p className="text-slate-500 mt-2">Inventory & Sales Management System</p>
        </div>
        <div className="bg-white rounded-xl shadow-lg border border-slate-200">
          <div className="p-6 pb-4">
            <h2 className="text-xl font-bold text-slate-900">Sign In</h2>
            <p className="text-slate-500 text-sm mt-1">Enter your credentials to access the system</p>
          </div>
          <div className="px-6 pb-6">
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" placeholder="your@email.com" value={email} onChange={e => setEmail(e.target.value)} required className="w-full h-11 px-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <div className="relative">
                  <input type={showPw ? 'text' : 'password'} placeholder="Enter your password" value={password} onChange={e => setPassword(e.target.value)} required className="w-full h-11 px-3 pr-10 rounded-lg border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm" />
                  <button type="button" onClick={() => setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                    <Icon name={showPw ? 'eyeoff' : 'eye'} size={16} />
                  </button>
                </div>
              </div>
              {error && <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg p-3">{error}</div>}
              <button type="submit" className="w-full h-11 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium text-sm transition-colors disabled:opacity-50" disabled={loading}>
                {loading ? <span className="flex items-center justify-center gap-2"><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spinner" />Signing in...</span> : 'Sign In'}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  );
}

// ==================== SALE ITEM BUILDER ====================
function SaleItemBuilder({ products, onConfirm, submitting, hideProfit }) {
  const [cart, setCart] = useState([]);
  const [description, setDescription] = useState('');
  const [selectedId, setSelectedId] = useState('');
  const [qty, setQty] = useState(1);

  const activeProducts = products.filter(p => p.isActive && p.quantityInStock > 0);

  const addToCart = () => {
    const product = activeProducts.find(p => p.id === selectedId);
    if (!product) return;
    const existing = cart.find(c => c.productId === selectedId);
    if (existing) {
      setCart(cart.map(c => c.productId === selectedId ? { ...c, quantity: Math.min(c.quantity + qty, product.quantityInStock) } : c));
    } else {
      setCart([...cart, { productId: selectedId, product, quantity: Math.min(qty, product.quantityInStock) }]);
    }
    setSelectedId('');
    setQty(1);
  };

  const removeFromCart = (pid) => setCart(cart.filter(c => c.productId !== pid));
  const updateQty = (pid, newQty) => {
    if (newQty <= 0) { removeFromCart(pid); return; }
    setCart(cart.map(c => c.productId === pid ? { ...c, quantity: Math.min(newQty, c.product.quantityInStock) } : c));
  };

  const subtotal = cart.reduce((s, c) => s + c.product.sellingPrice * c.quantity, 0);
  const totalVat = cart.reduce((s, c) => s + c.product.sellingPrice * c.quantity * (c.product.vatRate / 100), 0);
  const totalCost = cart.reduce((s, c) => s + c.product.costPrice * c.quantity, 0);
  const grandTotal = subtotal + totalVat;
  const totalProfit = subtotal - totalCost;
  const marginPct = subtotal > 0 ? (totalProfit / subtotal) * 100 : 0;
  const markupPct = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;

  return (
    <div className="space-y-4">
      <div>
        <label className="block text-sm font-medium text-slate-700 mb-1">Description / Customer Name</label>
        <input placeholder="e.g. Walk-in customer" value={description} onChange={e => setDescription(e.target.value)} className="w-full h-10 px-3 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" />
      </div>
      <div className="flex gap-2 items-end">
        <div className="flex-1">
          <label className="block text-xs font-medium text-slate-500 mb-1">Product</label>
          <select value={selectedId} onChange={e => setSelectedId(e.target.value)} className="w-full h-10 px-3 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
            <option value="">Select product...</option>
            {activeProducts.map(p => <option key={p.id} value={p.id}>{p.name} — {formatCurrency(p.sellingPrice)} (Stock: {p.quantityInStock} {p.unit})</option>)}
          </select>
        </div>
        <div className="w-20">
          <label className="block text-xs font-medium text-slate-500 mb-1">Qty</label>
          <input type="number" min={1} max={activeProducts.find(p => p.id === selectedId)?.quantityInStock || undefined} value={qty} onChange={e => setQty(parseInt(e.target.value) || 1)} className="w-full h-10 px-2 rounded-lg border border-slate-300 text-sm text-center outline-none focus:ring-2 focus:ring-emerald-500" />
        </div>
        <button type="button" onClick={addToCart} disabled={!selectedId} className="h-10 w-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg flex items-center justify-center disabled:opacity-50 transition-colors"><Icon name="plus" size={16} /></button>
      </div>

      {cart.length > 0 && (
        <div className="border rounded-lg overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 border-b"><tr>
                <th className="text-left p-3 font-medium text-slate-600">Product</th>
                <th className="text-center p-3 font-medium text-slate-600">Qty</th>
                {!hideProfit && <th className="text-right p-3 font-medium text-slate-600">Cost</th>}
                <th className="text-right p-3 font-medium text-slate-600">Selling</th>
                <th className="text-right p-3 font-medium text-slate-600">VAT</th>
                <th className="text-right p-3 font-medium text-slate-600">Total</th>
                <th className="w-10 p-3"></th>
              </tr></thead>
              <tbody>
                {cart.map(item => {
                  const lineSelling = item.product.sellingPrice * item.quantity;
                  const lineCost = item.product.costPrice * item.quantity;
                  const lineVat = lineSelling * (item.product.vatRate / 100);
                  return (
                    <tr key={item.productId} className="border-b last:border-0">
                      <td className="p-3 font-medium">{item.product.name}</td>
                      <td className="p-3 text-center"><input type="number" min={1} max={item.product.quantityInStock} value={item.quantity} onChange={e => updateQty(item.productId, parseInt(e.target.value) || 1)} className="w-16 h-8 text-center text-sm border rounded px-1 outline-none" /></td>
                      {!hideProfit && <td className="p-3 text-right text-slate-500">{formatCurrency(lineCost)}</td>}
                      <td className="p-3 text-right font-medium">{formatCurrency(lineSelling)}</td>
                      <td className="p-3 text-right text-orange-600">{formatCurrency(lineVat)} ({item.product.vatRate}%)</td>
                      <td className="p-3 text-right font-bold text-emerald-700">{formatCurrency(lineSelling + lineVat)}</td>
                      <td className="p-3"><button onClick={() => removeFromCart(item.productId)} className="text-red-400 hover:text-red-600"><Icon name="x" size={14} /></button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div className="bg-slate-50 p-4 space-y-2 text-sm">
            <div className="flex justify-between"><span className="text-slate-500">Subtotal</span><span>{formatCurrency(subtotal)}</span></div>
            {!hideProfit && <div className="flex justify-between"><span className="text-slate-500">Total Cost</span><span className="text-red-600">{formatCurrency(totalCost)}</span></div>}
            <div className="flex justify-between"><span className="text-slate-500">VAT</span><span className="text-orange-600">{formatCurrency(totalVat)}</span></div>
            <hr className="border-slate-200" />
            <div className="flex justify-between font-bold text-base"><span>Grand Total</span><span className="text-emerald-700">{formatCurrency(grandTotal)}</span></div>
            {!hideProfit && <>

        </button>
      </div>
    </div>
  );
}

// ==================== STAFF DASHBOARD ====================
function StaffDashboard({ user, onLogout, addToast }) {
  const [period, setPeriod] = useState('all');
  const [addOpen, setAddOpen] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [sales, setSales] = useState([]);
  const [products, setProducts] = useState([]);

  const refresh = useCallback(() => {
    const allSales = DB.get('sales', []).map(s => ({...s, user: DB.get('users', []).find(u => u.id === s.userId) || {name: s.recordedBy || 'Unknown'}, saleItems: s.saleItems || []}));
    setSales(filterByPeriod(allSales, period));
    setProducts(DB.get('products', []));
  }, [period]);

  useEffect(() => { refresh(); }, [refresh]);

  const stats = useMemo(() => {
    const c = sales.length;
    const r = sales.reduce((s, x) => s + x.totalAmount, 0);
    const v = sales.reduce((s, x) => s + x.vatAmount, 0);
    return { count: c, totalRevenue: r, totalVat: v };
  }, [sales]);

  const handleRecordSale = (items, description) => {
    setSubmitting(true);
    const allProducts = DB.get('products', []);
    const invalidItem = items.find(item => {
      const product = allProducts.find(p => p.id === item.productId);
      return !product || item.quantity < 1 || item.quantity > product.quantityInStock;
    });
    if (invalidItem) {
      addToast('Unable to record sale', 'A product is unavailable or does not have enough stock.', 'destructive');
      setSubmitting(false);
      return;
    }
    const saleItems = items.map(item => {
      const p = allProducts.find(x => x.id === item.productId);
      const lineSelling = p.sellingPrice * item.quantity;
      const lineCost = p.costPrice * item.quantity;
      const lineVat = lineSelling * (p.vatRate / 100);
      return { id: generateId(), productId: p.id, productName: p.name, quantity: item.quantity, costPrice: p.costPrice, sellingPrice: p.sellingPrice, vatRate: p.vatRate, vatAmount: lineVat, lineTotal: lineSelling + lineVat, lineCost, lineProfit: lineSelling - lineCost - lineVat };
    });
    const subtotal = saleItems.reduce((s, i) => s + i.sellingPrice * i.quantity, 0);
    const vatAmount = saleItems.reduce((s, i) => s + i.vatAmount, 0);
    const totalAmount = subtotal + vatAmount;
    const costTotal = saleItems.reduce((s, i) => s + i.lineCost, 0);
    const profit = totalAmount - costTotal - vatAmount;
    const marginPercent = subtotal > 0 ? (profit / subtotal) * 100 : 0;
    const markupPercent = costTotal > 0 ? (profit / costTotal) * 100 : 0;
    const sale = { id: generateId(), description, subtotal, vatAmount, totalAmount, costTotal, profit, marginPercent, markupPercent, recordedBy: user.name, recordedAt: new Date().toISOString(), userId: user.id, createdAt: new Date().toISOString(), saleItems };
    const allSales = DB.get('sales', []);
    allSales.unshift(sale);
    DB.set('sales', allSales);
    // Update stock
    items.forEach(item => {
      const idx = allProducts.findIndex(p => p.id === item.productId);
      if (idx >= 0) { allProducts[idx].quantityInStock -= item.quantity; }
    });
    DB.set('products', allProducts);
    addToast('Sale recorded!', 'Inventory updated automatically');
    setAddOpen(false);
    setSubmitting(false);
    refresh();
  };

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-lg bg-emerald-600 text-white flex items-center justify-center"><Icon name="cart" size={20} /></div>
            <div><h1 className="font-bold text-slate-900 text-lg leading-tight">Sales Tracker</h1><p className="text-xs text-slate-500">Staff Portal</p></div>
          </div>
          <div className="flex items-center gap-3">
            <span className="hidden sm:block text-sm text-slate-600">Welcome, <strong>{user.name}</strong></span>
            <button onClick={onLogout} className="flex items-center gap-2 px-3 py-1.5 border border-slate-300 rounded-lg text-sm hover:bg-slate-50 transition-colors"><Icon name="logout" size={14} /><span className="hidden sm:inline">Sign Out</span></button>
          </div>
        </div>
      </header>
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-6">
        <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
          {[
            { icon: 'dollar', color: 'text-emerald-600', label: 'Revenue', value: formatCurrency(stats.totalRevenue) },
            { icon: 'receipt', color: 'text-orange-600', label: 'VAT', value: formatCurrency(stats.totalVat) },
            { icon: 'cart', color: 'text-blue-600', label: 'Sales', value: stats.count },
          ].map((s, i) => (
            <div key={i} className="bg-white rounded-xl border border-slate-200 p-4">
              <div className="flex items-center gap-2"><span className={s.color}><Icon name={s.icon} size={16} /></span><span className="text-xs text-slate-500">{s.label}</span></div>
              <p className="text-lg font-bold text-slate-900 mt-1">{s.value}</p>
            </div>
          ))}
        </div>
        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
          <select value={period} onChange={e => setPeriod(e.target.value)} className="w-full sm:w-[180px] h-10 px-3 border border-slate-300 rounded-lg text-sm bg-white outline-none">
            <option value="all">All Time</option><option value="daily">Today</option><option value="weekly">This Week</option><option value="monthly">This Month</option><option value="yearly">This Year</option>
          </select>
          <button onClick={() => setAddOpen(true)} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium w-full sm:w-auto justify-center transition-colors"><Icon name="plus" size={16} />Record Sale</button>
        </div>

        {/* Record Sale Modal */}
        {addOpen && (
          <div className="fixed inset-0 z-50 flex items-start justify-center pt-10 px-4">
            <div className="fixed inset-0 bg-black/50" onClick={() => setAddOpen(false)} />

                <div><h3 className="text-lg font-bold text-slate-900">Record a Sale</h3><p className="text-sm text-slate-500">Select products from inventory. Stock will be deducted automatically.</p></div>
                <button onClick={() => setAddOpen(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20} /></button>
              </div>
              <div className="p-6"><SaleItemBuilder products={products} onConfirm={handleRecordSale} submitting={submitting} hideProfit /></div>

        )}

        <div className="bg-white rounded-xl border border-slate-200">
          <div className="p-5 border-b border-slate-100">
            <h3 className="text-lg font-bold text-slate-900">Your Sales Records</h3>
            <p className="text-sm text-slate-500">{stats.count} sale(s) — {periodLabels[period]}</p>
          </div>
          <div className="p-0">
            {sales.length === 0 ? (
              <div className="text-center py-12"><span className="text-slate-300"><Icon name="cart" size={48} /></span><p className="text-slate-500 mt-3">No sales recorded yet</p></div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead className="bg-slate-50 border-b"><tr>
                    <th className="text-left p-3 font-medium text-slate-600">Description</th>
                    <th className="p-3 font-medium text-slate-600">Items</th>
                    <th className="text-right p-3 font-medium text-slate-600">Subtotal</th>
                    <th className="text-right p-3 font-medium text-slate-600">VAT</th>
                    <th className="text-right p-3 font-medium text-slate-600">Total</th>
                    <th className="p-3 font-medium text-slate-600">Date</th>
                  </tr></thead>
                  <tbody>
                    {sales.map(s => (
                      <tr key={s.id} className="border-b last:border-0 hover:bg-slate-50">
                        <td className="p-3 font-medium">{s.description}</td>
                        <td className="p-3 text-center">{(s.saleItems || []).length} item(s)</td>

      </main>

// ==================== MODAL (top-level so it never remounts on every keystroke) ====================
function Modal({ open, onClose, title, subtitle, children }) {
  if (!open) return null;
  const handleClose = () => {
    onClose();
    // Restore focus to the main content area so inputs remain interactable
    setTimeout(() => {
      const main = document.querySelector('main');
      if (main) main.focus({ preventScroll: true });
    }, 50);
  };
  return (
    <div className="fixed inset-0 z-50 flex items-start justify-center pt-10 px-4" onMouseDown={e => { if (e.target === e.currentTarget) handleClose(); }}>
      <div className="fixed inset-0 bg-black/50" onClick={handleClose} />
      <div className="relative bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[85vh] overflow-y-auto z-10" onClick={e => e.stopPropagation()}>
        <div className="p-6 border-b border-slate-200 flex items-center justify-between">
          <div><h3 className="text-lg font-bold text-slate-900">{title}</h3>{subtitle && <p className="text-sm text-slate-500">{subtitle}</p>}</div>
          <button onClick={handleClose} className="text-slate-400 hover:text-slate-600"><Icon name="x" size={20} /></button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-medium disabled:opacity-50" disabled={submitting}>{submitting ? 'Saving...' : isEdit ? 'Update Product' : 'Add Product'}</button>
      </div>
    </form>
  );
}

    return filterByPeriod(all, period);
  }, [period, dataVersion]);

  const users = useMemo(() => DB.get('users', []), [dataVersion]);

  const stats = useMemo(() => {
    const c = sales.length;
    const r = sales.reduce((s, x) => s + x.totalAmount, 0);
    const co = sales.reduce((s, x) => s + x.costTotal, 0);
    const v = sales.reduce((s, x) => s + x.vatAmount, 0);
    const p = sales.reduce((s, x) => s + x.profit, 0);
    const am = c > 0 ? sales.reduce((s, x) => s + x.marginPercent, 0) / c : 0;
    const au = c > 0 ? sales.reduce((s, x) => s + x.markupPercent, 0) / c : 0;
    return { count: c, totalRevenue: r, totalCost: co, totalVat: v, totalProfit: p, avgMargin: am, avgMarkup: au };
  }, [sales]);

  const prodStats = useMemo(() => {
    const tp = products.length;
    const tsv = products.reduce((s, p) => s + p.sellingPrice * p.quantityInStock, 0);
    const tcv = products.reduce((s, p) => s + p.costPrice * p.quantityInStock, 0);
    const lsc = products.filter(p => p.quantityInStock <= p.reorderLevel && p.isActive).length;
    return { totalProducts: tp, totalStockValue: tsv, totalCostValue: tcv, lowStockCount: lsc };
  }, [products]);

        map[cat].profit += item.lineProfit;

  }, [sales, products]);

    DB.set('products', allProducts);

    setSubmitting(true);
    const allProducts = DB.get('products', []);
    const invalidItem = items.find(item => {
      const product = allProducts.find(p => p.id === item.productId);
      return !product || item.quantity < 1 || item.quantity > product.quantityInStock;
    });
    if (invalidItem) {
      addToast('Unable to record sale', 'A product is unavailable or does not have enough stock.', 'destructive');
      setSubmitting(false);
      return;
    }
    const saleItems = items.map(item => {
      const p = allProducts.find(x => x.id === item.productId);
      const lineSelling = p.sellingPrice * item.quantity;
      const lineCost = p.costPrice * item.quantity;
      const lineVat = lineSelling * (p.vatRate / 100);
      return { id: generateId(), productId: p.id, productName: p.name, quantity: item.quantity, costPrice: p.costPrice, sellingPrice: p.sellingPrice, vatRate: p.vatRate, vatAmount: lineVat, lineTotal: lineSelling + lineVat, lineCost, lineProfit: lineSelling - lineCost - lineVat };
    });
    const subtotal = saleItems.reduce((s, i) => s + i.sellingPrice * i.quantity, 0);
    const vatAmount = saleItems.reduce((s, i) => s + i.vatAmount, 0);
    const totalAmount = subtotal + vatAmount;
    const costTotal = saleItems.reduce((s, i) => s + i.lineCost, 0);
    const profit = totalAmount - costTotal - vatAmount;
    const marginPercent = subtotal > 0 ? (profit / subtotal) * 100 : 0;
    const markupPercent = costTotal > 0 ? (profit / costTotal) * 100 : 0;
    const sale = { id: generateId(), description, subtotal, vatAmount, totalAmount, costTotal, profit, marginPercent, markupPercent, recordedBy: user.name, recordedAt: new Date().toISOString(), userId: user.id, createdAt: new Date().toISOString(), saleItems };
    const allSales = DB.get('sales', []);
    allSales.unshift(sale);
    DB.set('sales', allSales);
    items.forEach(item => {
      const idx = allProducts.findIndex(p => p.id === item.productId);
      if (idx >= 0) { allProducts[idx].quantityInStock -= item.quantity; }
    });
    DB.set('products', allProducts);
    refreshData();
    addToast('Sale recorded!', 'Stock updated');
    setAddSaleOpen(false);
    setSubmitting(false);
  };

    if (!confirm('Delete this sale? Stock will be restored.')) return;
    const allSales = DB.get('sales', []);
    const allProducts = DB.get('products', []);
    const sale = allSales.find(s => s.id === id);
    if (sale && sale.saleItems) {

        const idx = allProducts.findIndex(p => p.id === item.productId);
        if (idx >= 0) { allProducts[idx].quantityInStock += item.quantity; }
      });

        <SaleItemBuilder products={products} onConfirm={handleRecordSale} submitting={submitting} />
      </Modal>

      <Modal open={addProductOpen} onClose={() => { setAddProductOpen(false); resetProductForm(); }} title="Add Product" subtitle="Add a new product to your inventory">
        <ProductForm values={productFormValues} setters={productFormSetters} onSubmit={handleAddProduct} onCancel={() => { setAddProductOpen(false); resetProductForm(); }} submitting={submittingProduct} isEdit={false} />
      </Modal>

      <Modal open={editProductOpen} onClose={() => { setEditProductOpen(false); setEditingProduct(null); resetProductForm(); }} title="Edit Product" subtitle="Update product details">
        <ProductForm values={productFormValues} setters={productFormSetters} onSubmit={handleEditProduct} onCancel={() => { setEditProductOpen(false); setEditingProduct(null); resetProductForm(); }} submitting={submittingProduct} isEdit={true} />
      </Modal>

      <Modal open={addUserOpen} onClose={() => setAddUserOpen(false)} title="Add User" subtitle="Create a new staff or admin account">
        <form onSubmit={handleAddUser} className="space-y-4">
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Name</label><input value={newUserName} onChange={e => setNewUserName(e.target.value)} required className="w-full h-10 px-3 rounded-lg border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-emerald-500" /></div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" value={newUserEmail} onChange={e => setNewUserEmail(e.target.value)} required className="w-full h-10 px-3 rounded-lg border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-emerald-500" /></div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <div className="relative"><input type={showNewPw ? 'text' : 'password'} value={newUserPassword} onChange={e => setNewUserPassword(e.target.value)} required className="w-full h-10 px-3 pr-10 rounded-lg border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-emerald-500" /><button type="button" onClick={() => setShowNewPw(!showNewPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name={showNewPw ? 'eyeoff' : 'eye'} size={16} /></button></div>
          </div>
          <div><label className="block text-sm font-medium text-slate-700 mb-1">Role</label><select value={newUserRole} onChange={e => setNewUserRole(e.target.value)} className="w-full h-10 px-3 rounded-lg border border-slate-300 text-sm outline-none bg-white focus:ring-2 focus:ring-emerald-500"><option value="STAFF">Staff</option><option value="CEO">CEO / Admin</option></select></div>
          <div className="flex justify-end gap-3">
            <button type="button" onClick={() => setAddUserOpen(false)} className="px-4 py-2 border border-slate-300 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
            <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-medium" disabled={submittingUser}>{submittingUser ? 'Creating...' : 'Create User'}</button>
          </div>
        </form>
      </Modal>

      {/* Change Password Modal */}
      <Modal open={changePwOpen} onClose={() => setChangePwOpen(false)} title="Change Password" subtitle={`Update password for ${changePwUserName}`}>
        <div className="space-y-4">
          <div><label className="block text-sm font-medium text-slate-700 mb-1">New Password</label>
            <div className="relative"><input type={showChangePw ? 'text' : 'password'} value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Min 4 characters" className="w-full h-10 px-3 pr-10 rounded-lg border border-slate-300 text-sm outline-none focus:ring-2 focus:ring-emerald-500" /><button type="button" onClick={() => setShowChangePw(!showChangePw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name={showChangePw ? 'eyeoff' : 'eye'} size={16} /></button></div>
          </div>
          <div className="flex justify-end gap-3">
            <button onClick={() => setChangePwOpen(false)} className="px-4 py-2 border border-slate-300 rounded-lg text-sm hover:bg-slate-50">Cancel</button>
            <button onClick={handleChangePassword} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-medium" disabled={submittingPw}>{submittingPw ? 'Changing...' : 'Change Password'}</button>
          </div>
        </div>
      </Modal>

      {/* Sale Detail Modal */}
      <Modal open={saleDetailOpen} onClose={() => { setSaleDetailOpen(false); setSelectedSale(null); }} title={selectedSale?.description || 'Sale Details'} subtitle={selectedSale ? formatDate(selectedSale.recordedAt) : ''}>
        {selectedSale && (
          <div className="space-y-4">
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {[
                { label: 'Subtotal', value: formatCurrency(selectedSale.subtotal) },
                { label: 'VAT', value: formatCurrency(selectedSale.vatAmount), color: 'text-orange-600' },
                { label: 'Total', value: formatCurrency(selectedSale.totalAmount), color: 'text-emerald-700' },
                { label: 'Profit', value: formatCurrency(selectedSale.profit), color: 'text-emerald-600' },
              ].map((s, i) => (
                <div key={i} className="bg-slate-50 rounded-lg p-3"><p className="text-xs text-slate-500">{s.label}</p><p className={`font-bold ${s.color || ''}`}>{s.value}</p></div>
              ))}
            </div>
            {(selectedSale.saleItems || []).length > 0 && (
              <table className="w-full text-sm border rounded-lg overflow-hidden">
                <thead className="bg-slate-50 border-b"><tr>
                  <th className="text-left p-3 font-medium text-slate-600">Product</th>
                  <th className="text-center p-3 font-medium text-slate-600">Qty</th>
                  <th className="text-right p-3 font-medium text-slate-600">Cost</th>
                  <th className="text-right p-3 font-medium text-slate-600">Selling</th>
                  <th className="text-right p-3 font-medium text-slate-600">Total</th>
                </tr></thead>
                <tbody>
                  {selectedSale.saleItems.map(item => (
                    <tr key={item.id} className="border-b last:border-0">
                      <td className="p-3 font-medium">{item.productName}</td>
                      <td className="p-3 text-center">{item.quantity}</td>
                      <td className="p-3 text-right text-slate-500">{formatCurrency(item.costPrice)}</td>
                      <td className="p-3 text-right">{formatCurrency(item.sellingPrice)}</td>
                      <td className="p-3 text-right font-semibold text-emerald-700">{formatCurrency(item.lineTotal)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
            <p className="text-sm text-slate-500">Recorded by: {selectedSale.user?.name || 'Unknown'}</p>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ==================== MAIN APP ====================
function App() {
  const [user, setUser] = useState(null);
  const [toasts, setToasts] = useState([]);

  useEffect(() => {
    const saved = sessionStorage.getItem('st_session');
    if (saved) {
      try { setUser(JSON.parse(saved)); } catch {}
    }
  }, []);

  useEffect(() => { if (user) sessionStorage.setItem('st_session', JSON.stringify(user)); }, [user]);

  const addToast = (title, description = '', variant = '') => {
    const id = ++toastId;
    setToasts(prev => [...prev, { id, title, description, variant }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  };

  const handleLogin = (u) => {
    setUser({ id: u.id, email: u.email, name: u.name, role: u.role });
  };

  const handleLogout = () => {
    setUser(null);
    sessionStorage.removeItem('st_session');
  };

  const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

  if (!user) return <LoginPage onLogin={handleLogin} />;

  return (
    <div>
      <ToastContainer toasts={toasts} removeToast={removeToast} />
      {user.role === 'CEO' ? <CEODashboard user={user} onLogout={handleLogout} addToast={addToast} /> : <StaffDashboard user={user} onLogout={handleLogout} addToast={addToast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
